.sidebar {
  width: 260px;
  min-height: 100vh;
  background-color: #ffffff;

.sidebar h2 {
  font-size: 24px;

}

.sidebar a {

}

.sidebar a:hover {

}

body {

/*Mobile Breakpoint*/
@media (max-width: 768px) {

    padding: 15px;

  h1, h2, h3, p {
