<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yasmina Makkouk Portfolio</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin-left: 260px;
      padding: 40px;
      background-color: #f9fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
    }

    .navbar {
      border-right: 1px solid #eee;
    }

    .content {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 10px;
      font-weight: 700;
    }

    .lead {
      color: #666;
      margin-bottom: 40px;
    }

    h2 {
      margin-top: 100px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .section-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c63ff;
      font-weight: 600;
      margin-top: 35px;
      margin-bottom: 8px;
    }

    .case-card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      margin-top: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      transition: all 0.25s ease;
    }

    .case-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.08);
    }

    /* CLUB WORK: no cropping */
    #Carousel img {
      max-height: 400px;
      width: 100%;
      object-fit: contain;
      background-color: #f9fafc;
      border-radius: 16px;
    }

    /* MOCKUPS: cropped nicely */
    #MealMatchCarousel img,
    #NPASRedesign img {
      height: 400px;
      width: 100%;
      object-fit: cover;
      border-radius: 16px;
    }

    /* =========================
       BASE CAROUSEL ARROWS
       ========================= */
    .carousel-control-prev-icon,
    .carousel-control-next-icon {
      filter: brightness(0) invert(1);
      background-color: rgba(0, 0, 0, 0.25);
      border-radius: 50%;
      padding: 15px;
      opacity: 0.85;
      transition: all 0.2s ease;
    }

    .carousel-control-prev:hover .carousel-control-prev-icon,
    .carousel-control-next:hover .carousel-control-next-icon {
      opacity: 1;
      background-color: rgba(0, 0, 0, 0.4);
    }

    /* GRAPHIC WORK FIX (makes arrows visible on light images) */
    #Carousel .carousel-control-prev-icon,
    #Carousel .carousel-control-next-icon {
      background-color: rgba(0, 0, 0, 0.45);
      padding: 18px;
      opacity: 0.95;
    }

    #Carousel .carousel-control-prev:hover .carousel-control-prev-icon,
    #Carousel .carousel-control-next:hover .carousel-control-next-icon {
      background-color: rgba(0, 0, 0, 0.65);
    }

    @media (max-width: 768px) {
      body {
        margin-left: 0;
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<nav class="navbar navbar-expand-md navbar-light bg-white d-none d-md-flex flex-column p-4"
     style="width:260px; min-height:100vh; position:fixed; left:0; top:0;">
  <div class="navbar-nav flex-column w-100">

    <a class="nav-link mb-2" href="about.html">About Me</a>

  <!-- ================= Club Work ================= -->

    <div class="d-flex justify-content-center mt-4">
      <div style="max-width: 520px; width: 100%;">

        <div id="Carousel" class="carousel slide">
          <div class="carousel-inner rounded-4 overflow-hidden">
            <div class="carousel-item active">
              <img src="../Images/FYC.jpeg" class="d-block w-100">
            </div>
            <div class="carousel-item">
              <img src="../Images/FYCJN.jpg" class="d-block w-100">
            </div>
            <div class="carousel-item">

            </div>
            <div class="carousel-item">

            </div>
            <div class="carousel-item">

            <div class="carousel-item">

            <div class="carousel-item">

          <div class="carousel-indicators">
            <button type="button" data-bs-target="#Carousel" data-bs-slide-to="0" class="active"></button>
            <button type="button" data-bs-target="#Carousel" data-bs-slide-to="1"></button>

          <button class="carousel-control-prev" type="button" data-bs-target="#Carousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#Carousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const carousels = document.querySelectorAll('.carousel');
  carousels.forEach(c => new bootstrap.Carousel(c, {
    interval: false,
    ride: false,
    touch: true
  }));
});
</script>
